name: "Setup Node and npm"
description: "Set up Node.js and ensure an npm supporting 'id-token' is installed"

inputs:
  node-version:
    description: 'Version Spec of the version to use. Examples: 12.x, 10.15.1, >=10.15.0.'
    required: false
    default: '22.x'
  cache:
    description: 'Used to specify a package manager for caching in the default directory. Supported values: npm, yarn, pnpm.'
    required: false
    default: 'npm'
  cache-dependency-path:
    description: 'Used to specify the path to a dependency file: package-lock.json, yarn.lock, etc. Supports wildcards or a list of file names for caching multiple dependencies.'
    required: true
  registry-url:
    description: 'Optional registry to set up for auth. Will set the registry in a project level .npmrc and .yarnrc file, and set up auth to read in from env.NODE_AUTH_TOKEN.'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}
        registry-url: ${{ inputs.registry-url }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    # Temporary work around for a bug in Node 22.22.2
    - name: Resolve temporary Node.js pin for 22.x
      id: resolve-node-version
      shell: bash
      run: |
        effective_node_version='${{ inputs.node-version }}'
        if [[ '${{ inputs.node-version }}' == '22.x' ]]; then
          resolved_node_version="$(node --version | sed 's/^v//')"
          if [[ "$resolved_node_version" == '22.22.2' ]]; then
            effective_node_version='22.22.1'
          fi
        fi
        echo "effective-node-version=$effective_node_version" >> "$GITHUB_OUTPUT"

    - name: Reconfigure Node.js to 22.22.1
      if: ${{ steps.resolve-node-version.outputs.effective-node-version != inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ steps.resolve-node-version.outputs.effective-node-version }}
        cache: ${{ inputs.cache }}
        registry-url: ${{ inputs.registry-url }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Update npm to at least 11.5.1
      shell: bash
      run: |
        npm install -g npm@11
        echo "npm version: $(npm --version)"
